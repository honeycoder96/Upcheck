networks:
  talentsync-infra:
    external: true

services:
  api:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
      target: development
    container_name: uptime-api-dev
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
      - MONGODB_URI=mongodb://mongo:27017/uptimemonitor
      - REDIS_URI=redis://redis:6379
      - JWT_ACCESS_SECRET=dev-access-secret-change-me
      - JWT_REFRESH_SECRET=dev-refresh-secret-change-me
      - CORS_ORIGIN=http://localhost:5173
      - APP_URL=http://localhost:5173
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    command: sh -c "npm install && npm run dev --workspace=apps/server"
    restart: unless-stopped
    networks:
      - default
      - talentsync-infra

  worker:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
      target: development
    container_name: uptime-worker-dev
    environment:
      - NODE_ENV=development
      - MONGODB_URI=mongodb://mongo:27017/uptimemonitor
      - REDIS_URI=redis://redis:6379
      - JWT_ACCESS_SECRET=dev-access-secret-change-me
      - JWT_REFRESH_SECRET=dev-refresh-secret-change-me
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    command: sh -c "npm install && npm run worker:dev --workspace=apps/server"
    restart: unless-stopped
    networks:
      - default
      - talentsync-infra

  client:
    build:
      context: .
      dockerfile: apps/client/Dockerfile
      target: development
    container_name: uptime-client-dev
    ports:
      - "5173:5173"
    environment:
      - CHOKIDAR_USEPOLLING=true
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    command: sh -c "npm install && npm run dev --workspace=apps/client -- --host 0.0.0.0"
    restart: unless-stopped
    networks:
      - default

volumes:
  node_modules:
